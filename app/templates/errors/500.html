{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full text-center">
        <h1 class="text-6xl font-extrabold text-red-500 mb-4">500</h1>
        <h2 class="text-2xl font-semibold text-white mb-2">Error Crítico del Servidor</h2>
        <p class="text-gray-400 mb-8">El servidor encontró un error inesperado al procesar tu solicitud. El equipo técnico ha sido notificado.</p>
        <div class="space-x-4">
            <button onclick="window.location.reload()" class="bg-transparent border border-gray-500 text-gray-300 hover:text-white hover:border-white py-2 px-6 rounded transition-colors duration-200">
                Reintentar
            </button>
            <a href="{{ url_for('main.index') }}" class="inline-block bg-yellow-400 hover:bg-yellow-500 text-black font-semibold py-2 px-6 rounded transition-colors duration-200">
                Ir al Inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
